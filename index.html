<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>@FineDemon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
        /* ─── ROOT ─── */
        :root {
            --g: #00e872;
            --gb: #00ff7e;
            --gd: #00b857;
            --bg: #010b04;
            --pbg: #020d06;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background: transparent;
            font-family: 'Rajdhani', system-ui, sans-serif;
            pointer-events: none;
            /* body non‑interactive so iframe gets clicks */;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            position: relative;
        }

        /* ─── BACKGROUND IFRAME ─── */
        #bg-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            border: none;
            pointer-events: auto;
        }

        /* ─── LAUNCHER (mini) ─── */
        .launcher {
            position: absolute;
            top: 12%;
            right: 10px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 32%, #032410 0%, #010b04 75%);
            border: 2px solid var(--g);
            box-shadow: 0 0 12px var(--gb), 0 0 30px rgba(0, 232, 114, .35), inset 0 0 14px rgba(0, 255, 126, .5);
            display: grid;
            place-items: center;
            cursor: pointer;
            z-index: 90;
            overflow: hidden;
            animation: launchPulse 2.5s ease-in-out infinite;
            pointer-events: auto;
        }

        .launcher img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes launchPulse {
            0%,
            100% {
                box-shadow: 0 0 12px var(--gb), 0 0 24px rgba(0, 232, 114, .3), inset 0 0 12px rgba(0, 255, 126, .5);
            }
            50% {
                box-shadow: 0 0 26px var(--gb), 0 0 55px rgba(0, 232, 114, .65), inset 0 0 24px rgba(0, 255, 126, .85);
            }
        }

        /* ─── MAIN PANEL (stage) ─── */
        .stage {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            display: none;
            z-index: 1001;
            pointer-events: auto;
        }

        /* ─── PANEL SHELL ─── */
        .panel-shell {
            position: relative;
            padding: 1.5px;
            overflow: hidden;
            clip-path: polygon(14px 0, calc(100% - 14px) 0, 100% 14px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0 calc(100% - 14px), 0 14px);
            background: rgba(0, 255, 126, 0.35);
            filter: drop-shadow(0 0 14px rgba(0, 232, 114, .55));
        }

        .panel {
            position: relative;
            z-index: 2;
            width: 100%;
            background: linear-gradient(158deg, #021508 0%, #010b04 48%, #031a09 100%);
            clip-path: polygon(13px 0, calc(100% - 13px) 0, 100% 13px, 100% calc(100% - 13px), calc(100% - 13px) 100%, 13px 100%, 0 calc(100% - 13px), 0 13px);
            padding: 8px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: auto;
        }

        /* scanline overlay */
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 232, 114, .013) 3px, rgba(0, 232, 114, .013) 4px);
        }

        /* ─── HEADER ─── */
        .head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            position: relative;
            z-index: 5;
            padding-bottom: 7px;
            cursor: grab;
        }
        .head:active {
            cursor: grabbing;
        }

        .head::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 126, .6), rgba(255, 255, 255, .45), rgba(0, 255, 126, .6), transparent);
            animation: sepGlow 3s ease-in-out infinite alternate;
        }

        @keyframes sepGlow {
            0% {
                opacity: .5;
            }
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 4px rgba(0, 255, 126, .8));
            }
        }

        .head-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 8.5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
            background: linear-gradient(90deg, #00ff7e 0%, #c0ffe0 25%, #fff 50%, #c0ffe0 75%, #00ff7e 100%);
            background-size: 280% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: titleFlow 3s linear infinite, titleGlitch 9s ease-in-out infinite;
            filter: drop-shadow(0 0 7px rgba(0, 232, 114, .9));
        }

        @keyframes titleFlow {
            to {
                background-position: 280% center;
            }
        }
        @keyframes titleGlitch {
            0%,
            88%,
            95%,
            100% {
                transform: none;
            }
            89% {
                transform: translate(-2px, 0) skewX(-4deg);
                filter: drop-shadow(-3px 0 5px rgba(0, 255, 126, .8)) drop-shadow(3px 0 5px rgba(0, 200, 255, .6));
            }
            90% {
                transform: translate(2px, 0) skewX(4deg);
                filter: drop-shadow(3px 0 5px rgba(255, 0, 160, .5)) drop-shadow(-3px 0 5px rgba(0, 255, 126, .8));
            }
            91% {
                transform: translate(-1px, 0);
            }
            92% {
                transform: none;
                filter: drop-shadow(0 0 7px rgba(0, 232, 114, .9));
            }
        }

        .actv {
            position: relative;
            overflow: hidden;
            border: 1.5px solid rgba(0, 255, 126, .9);
            color: #00ff7e;
            background: linear-gradient(135deg, rgba(0, 232, 114, .2), rgba(0, 255, 126, .04));
            border-radius: 10px;
            padding: 3px 9px;
            font-size: 6px;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 0 12px rgba(0, 232, 114, .7), inset 0 0 8px rgba(0, 232, 114, .35);
            text-shadow: 0 0 7px var(--gb);
            white-space: nowrap;
            animation: actvBeat 1.6s ease-in-out infinite alternate;
        }

        .actv::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 126, .55), transparent);
            animation: actvSweep 2.8s ease-in-out infinite;
        }

        @keyframes actvSweep {
            0% {
                left: -100%;
            }
            22% {
                left: 200%;
            }
            100% {
                left: 200%;
            }
        }
        @keyframes actvBeat {
            0% {
                box-shadow: 0 0 8px rgba(0, 232, 114, .5), inset 0 0 5px rgba(0, 232, 114, .3);
            }
            100% {
                box-shadow: 0 0 22px rgba(0, 255, 126, 1), inset 0 0 14px rgba(0, 232, 114, .7);
            }
        }

        /* ─── DISPLAY WRAPPER ─── */
        .display-wrap {
            position: relative;
            padding: 1.5px;
            border-radius: 9px;
            background: linear-gradient(135deg, rgba(0, 255, 126, .8) 0%, rgba(0, 232, 114, .1) 38%, rgba(0, 232, 114, .1) 62%, rgba(0, 255, 126, .8) 100%);
            box-shadow: 0 0 22px rgba(0, 232, 114, .22), inset 0 0 8px rgba(0, 232, 114, .04);
        }

        /* ─── DISPLAY ─── */
        .display {
            position: relative;
            border-radius: 8px;
            background: radial-gradient(ellipse at 50% 0%, #021508 0%, #010b04 60%, #000903 100%);
            padding: 6px 10px 8px;
            overflow: hidden;
            height: 118px;
            box-shadow: inset 0 0 55px rgba(0, 0, 0, .8), inset 0 0 20px rgba(0, 232, 114, .04);
        }

        #pcanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 7px;
            z-index: 0;
            pointer-events: none;
        }

        .display::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background-image: linear-gradient(rgba(0, 232, 114, .05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 232, 114, .05) 1px, transparent 1px);
            background-size: 13px 13px;
        }

        .display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 8%;
            right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 126, .8), rgba(255, 255, 255, .5), rgba(0, 255, 126, .8), transparent);
            z-index: 10;
            pointer-events: none;
            animation: topEdgePulse 3s ease-in-out infinite alternate;
        }

        @keyframes topEdgePulse {
            0% {
                opacity: .5;
            }
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 5px rgba(0, 255, 126, .9));
            }
        }

        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            top: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(0, 255, 126, .06) 15%, rgba(0, 255, 126, .45) 50%, rgba(0, 255, 126, .06) 85%, transparent 100%);
            box-shadow: 0 0 8px rgba(0, 255, 126, .3), 0 0 2px rgba(255, 255, 255, .2);
            z-index: 3;
            pointer-events: none;
            animation: scanMove 5.5s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes scanMove {
            0% {
                transform: translateY(5px);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                transform: translateY(100px);
                opacity: 0;
            }
        }

        .hud-tag {
            position: absolute;
            font-family: 'Share Tech Mono', monospace;
            font-size: 5.5px;
            letter-spacing: 1px;
            color: rgba(0, 232, 114, .38);
            z-index: 8;
            pointer-events: none;
            animation: tagFade 3s ease-in-out infinite alternate;
        }
        .hud-tag.tl {
            top: 4px;
            left: 6px;
        }
        .hud-tag.tr {
            top: 4px;
            right: 6px;
        }
        @keyframes tagFade {
            0% {
                opacity: .25;
            }
            100% {
                opacity: .6;
            }
        }

        .ai-hud-core {
            display: none !important;
        }

        /* ─── PERIOD BADGE ─── */
        .period-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: linear-gradient(90deg, rgba(0, 232, 114, .03), rgba(0, 232, 114, .16), rgba(0, 232, 114, .03));
            border: 1px solid rgba(0, 232, 114, .52);
            border-radius: 16px;
            padding: 2px 11px;
            width: fit-content;
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden;
            z-index: 6;
            box-shadow: 0 0 16px rgba(0, 232, 114, .28), inset 0 0 8px rgba(0, 232, 114, .1);
        }

        .period-badge::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .22), transparent);
            transform: translateX(-200%) skewX(-25deg);
            animation: pSweep 3.2s ease-in-out infinite;
        }

        @keyframes pSweep {
            0% {
                transform: translateX(-200%) skewX(-25deg);
            }
            32% {
                transform: translateX(300%) skewX(-25deg);
            }
            100% {
                transform: translateX(300%) skewX(-25deg);
            }
        }

        .live-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            background: radial-gradient(circle at 38% 38%, #00ffaa, #00e872);
            box-shadow: 0 0 6px #00ff7e, 0 0 16px rgba(0, 255, 126, .9);
            animation: dotBlink .85s ease-in-out infinite alternate;
        }

        @keyframes dotBlink {
            0% {
                opacity: .3;
                transform: scale(.75);
            }
            100% {
                opacity: 1;
                transform: scale(1.25);
            }
        }

        .period-text {
            font-family: 'Orbitron', monospace;
            font-size: 8.5px;
            font-weight: 900;
            color: rgba(255, 255, 255, .85);
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .period-text span {
            color: #00ff7e;
            text-shadow: 0 0 9px rgba(0, 255, 126, .9);
        }

        /* ─── RING WRAP ─── */
        .ring-wrap {
            position: absolute;
            z-index: 5;
            width: 64px;
            height: 64px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .ring-pulse {
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            border: 1px solid rgba(0, 232, 114, .55);
            animation: pulseExpand 2.2s ease-out infinite;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes pulseExpand {
            0% {
                transform: scale(.95);
                opacity: .8;
            }
            100% {
                transform: scale(1.18);
                opacity: 0;
            }
        }

        .ring-spin-cw {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid rgba(0, 255, 126, 1);
            border-right: 2px solid rgba(0, 255, 126, .35);
            box-shadow: 0 0 8px rgba(0, 255, 126, .5);
            animation: spinCW 1.4s linear infinite;
            pointer-events: none;
        }

        .ring-spin-ccw {
            position: absolute;
            width: 63px;
            height: 63px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-bottom: 1.5px solid rgba(0, 255, 126, .85);
            border-left: 1.5px solid rgba(0, 255, 126, .3);
            animation: spinCCW 2.2s linear infinite;
            pointer-events: none;
        }

        @keyframes spinCW {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes spinCCW {
            to {
                transform: rotate(-360deg);
            }
        }

        .ring-orbit {
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            animation: orbitSpin 1.8s linear infinite;
            pointer-events: none;
            will-change: transform;
        }
        .ring-orbit::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #ffffff, #00ff7e);
            box-shadow: 0 0 7px #00ff7e, 0 0 18px rgba(0, 255, 126, .9), 0 0 30px rgba(0, 255, 126, .5);
        }
        .ring-orbit::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 3.5px;
            height: 3.5px;
            border-radius: 50%;
            background: #00e872;
            box-shadow: 0 0 6px #00e872, 0 0 14px rgba(0, 232, 114, .8);
        }
        @keyframes orbitSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .ring-orbit2 {
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            animation: orbitSpin 2.8s linear reverse infinite;
            pointer-events: none;
            will-change: transform;
        }
        .ring-orbit2::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #00ffaa;
            box-shadow: 0 0 5px #00ff7e, 0 0 10px rgba(0, 255, 126, .7);
        }

        .ring {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid var(--g);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ringHum 2.4s ease-in-out infinite alternate;
            will-change: box-shadow;
            overflow: hidden;
        }

        @keyframes ringHum {
            0% {
                box-shadow: 0 0 10px rgba(0, 232, 114, .7), 0 0 20px rgba(0, 232, 114, .2), inset 0 0 10px rgba(0, 232, 114, .4);
            }
            100% {
                box-shadow: 0 0 22px rgba(0, 255, 126, 1), 0 0 42px rgba(0, 232, 114, .45), inset 0 0 18px rgba(0, 232, 114, .7);
            }
        }

        .ball-glow {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 126, .7) 0%, rgba(0, 232, 114, .35) 45%, transparent 72%);
            filter: blur(5px);
            opacity: 0;
            transition: opacity .45s ease;
            z-index: 1;
            pointer-events: none;
        }
        .ball-glow.lit {
            opacity: 1;
            animation: glowBreath 1.3s ease-in-out infinite alternate;
        }
        @keyframes glowBreath {
            0% {
                transform: scale(.85);
                filter: blur(5px);
                opacity: .85;
            }
            100% {
                transform: scale(1.18);
                filter: blur(9px);
                opacity: 1;
            }
        }

        .ball {
            position: relative;
            z-index: 2;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 900;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 0 8px rgba(255, 255, 255, .9), 0 1px 4px rgba(0, 0, 0, .6);
            background: radial-gradient(circle at 35% 28%, rgba(0, 60, 25, .55), transparent 70%);
        }

        .ball img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 14px rgba(0, 255, 126, .9)) drop-shadow(0 2px 6px rgba(0, 0, 0, .5));
            display: block;
        }

        /* ─── SURESHOT BADGE ─── */
        .sureshot-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: linear-gradient(135deg, #023318 0%, #011508 50%, #023318 100%);
            border: 1.5px solid rgba(0, 255, 126, .95);
            border-radius: 20px;
            padding: 2px 9px;
            width: fit-content;
            box-shadow: 0 0 18px rgba(0, 232, 114, .7), inset 0 0 12px rgba(0, 232, 114, .45);
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            margin: 0 auto;
            z-index: 6;
            overflow: hidden;
            white-space: nowrap;
        }

        .sureshot-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 126, .85), transparent);
            transform: skewX(-20deg);
            animation: ssSweep 2.4s ease-in-out infinite;
        }

        @keyframes ssSweep {
            0% {
                left: -100%;
            }
            30% {
                left: 200%;
            }
            100% {
                left: 200%;
            }
        }

        .sureshot-text {
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 6.5px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ff7e, 0 0 18px rgba(0, 255, 126, .7);
        }
        .sureshot-icon {
            color: #00ff7e;
            font-size: 8px;
            text-shadow: 0 0 12px #00ff7e;
            animation: dotBlink .9s ease-in-out infinite alternate;
        }

        @keyframes popIn {
            0% {
                transform: scale(.5) translateY(-8px);
                opacity: 0;
            }
            70% {
                transform: scale(1.1) translateY(0);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* ─── PRED TEXT (now only used for status messages like WAITING) ─── */
        .pred-text {
            position: absolute;
            z-index: 5;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            min-height: 18px;
            bottom: 8px;
            left: 0;
            right: 0;
            text-shadow: 0 0 8px rgba(0, 232, 114, .3);
        }

        /* ─── STATUS BADGES (for reg/waiting states) ─── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 7.5px;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            animation: badgePulse 1.6s ease-in-out infinite alternate;
        }
        @keyframes badgePulse {
            0% {
                filter: brightness(.85);
            }
            100% {
                filter: brightness(1.28);
            }
        }

        .badge-deposit {
            background: linear-gradient(135deg, rgba(255, 160, 0, .12), rgba(255, 100, 0, .05));
            color: #ffaa00;
            border: 1px solid rgba(255, 170, 0, .85);
            box-shadow: 0 0 16px rgba(255, 165, 0, .45), inset 0 0 8px rgba(255, 165, 0, .18);
            text-shadow: 0 0 7px #ffaa00;
        }
        .badge-auth {
            background: linear-gradient(135deg, rgba(255, 50, 50, .12), rgba(200, 20, 20, .05));
            color: #ff4444;
            border: 1px solid rgba(255, 60, 60, .85);
            box-shadow: 0 0 16px rgba(255, 58, 58, .45), inset 0 0 8px rgba(255, 58, 58, .18);
            text-shadow: 0 0 7px #ff3a3a;
        }
        .badge-active {
            background: linear-gradient(135deg, rgba(0, 232, 114, .15), rgba(0, 200, 90, .05));

                            <div class="ov-tkr tt"><span class="ov-tki">A1:FF B2:3C C9:7E D4:AA E5:12 F0:9B 3D:7C A1:FF B2:3C C9:7E</span></div>
                            <div class="ov-pr">
                                <div class="ov-prr p1"></div>
                                <div class="ov-prr p2"></div>
                                <div class="ov-prr p3"></div>
                            </div>
                            <div class="ov-ret">
                                <div class="ov-rr r4"></div>
                                <div class="ov-rr r3"></div>
                                <div class="ov-rr r2"></div>
                                <div class="ov-rr r1"></div>
                                <div class="ov-rxh"></div>
                                <div class="ov-rxv"></div>
                                <div class="ov-dot"></div>
                            </div>
                            <div class="ov-dc l">
                                <div class="ov-dr"><span class="ov-dl">SYS</span><span class="ov-dv">LOCK</span></div>
                                <div class="ov-dr"><span class="ov-dl">ALG</span><span class="ov-dv" id="dv1">RUN</span></div>
                                <div class="ov-dr"><span class="ov-dl">NET</span><span class="ov-dv">OK</span></div>
                            </div>
                            <div class="ov-dc r">
                                <div class="ov-dr"><span class="ov-dv" id="dv3">97%</span><span class="ov-dl">CPU</span></div>
                                <div class="ov-dr"><span class="ov-dv" id="dv4">FF</span><span class="ov-dl">MEM</span></div>
                                <div class="ov-dr"><span class="ov-dv">ACT</span><span class="ov-dl">AI</span></div>
                            </div>
                            <div class="ov-tkr tb"><span class="ov-tki rv">7E:C3 A9:F0 B3:11 D8:4E 2A:CC 9F:07 5B:E8 7E:C3 A9:F0</span></div>
                            <div class="ov-eq">
                                <div class="ov-eqb e1"></div><div class="ov-eqb e2"></div>
                                <div class="ov-eqb e3"></div><div class="ov-eqb e4"></div>
                                <div class="ov-eqb e5"></div><div class="ov-eqb e6"></div>
                                <div class="ov-eqb e7"></div><div class="ov-eqb e8"></div>
                                <div class="ov-eqb e9"></div>
                            </div>
                            <div class="ov-ml"><span class="ov-st">ANALYSING</span></div>
                        </div>

                    </div>
                </div>

                <!-- BUTTONS -->
                <div class="btns">
                    <button class="btn btn-exec" id="btnExec" onclick="manualFetch()">EXECUTE</button>
                    <button class="btn btn-hide" onclick="closeM()">HIDE</button>
                </div>

                <button id="btnMode" style="display:none;"></button>

            </div>
        </div>
    </div>

    <script>
        /* ─── CANVAS PARTICLE SYSTEM ─── */
        (function() {
            var cv = document.getElementById('pcanvas');
            if (!cv) return;
            var ctx = cv.getContext('2d');
            var W, H, particles = [];

            function resize() {
                var p = cv.parentElement;
                W = cv.width = p.offsetWidth || 210;
                H = cv.height = p.offsetHeight || 150;
            }

            function init() {
                particles = [];
                var n = Math.min(Math.floor(W * H / 500), 40);
                for (var i = 0; i < n; i++) {
                    particles.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: Math.random() * 1.3 + 0.2,
                        vx: (Math.random() - 0.5) * 0.28,
                        vy: (Math.random() - 0.5) * 0.28,
                        a: Math.random() * 0.5 + 0.12,
                        da: (Math.random() - 0.5) * 0.008
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.a += p.da;
                    if (p.a <= 0.08 || p.a >= 0.65) p.da *= -1;
                    if (p.x < 0) p.x = W;
                    if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H;
                    if (p.y > H) p.y = 0;
                    ctx.save();
                    ctx.globalAlpha = p.a;
                    ctx.shadowColor = '#00ff7e';
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = '#00ff7e';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 42) {
                            var alpha = (1 - dist / 42) * 0.18;
                            ctx.save();
                            ctx.globalAlpha = alpha;
                            ctx.strokeStyle = '#00ff7e';
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            resize();
            init();
            draw();
            window.addEventListener('resize', function() { resize();
                init(); });
        })();

        /* ─── DRAGGABLE ─── */
        function dragElement(elmnt, handle) {
            var pos1 = 0,
                pos2 = 0,
                pos3 = 0,
                pos4 = 0;
            if (handle) {
                handle.onmousedown = dragMouseDown;
                handle.ontouchstart = dragMouseDown;
            } else {
                elmnt.onmousedown = dragMouseDown;
                elmnt.ontouchstart = dragMouseDown;
            }

            function dragMouseDown(e) {
                if (e.target.closest('.btn') || e.target.closest('.actv')) return;
                e = e || window.event;
                if (e.type === 'touchstart') {
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    e.preventDefault();
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }
                document.onmouseup = closeDragElement;
                document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                if (e.type === 'touchmove') {
                    pos1 = pos3 - e.touches[0].clientX;
                    pos2 = pos4 - e.touches[0].clientY;
                    pos3 = e.touches[0].clientX;
                    pos4 = e.touches[0].clientY;
                } else {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                }
                var newTop = elmnt.offsetTop - pos2;
                var newLeft = elmnt.offsetLeft - pos1;
                elmnt.style.top = newTop + "px";
                elmnt.style.left = newLeft + "px";
                if (elmnt.id === 'main') elmnt.style.transform = 'none';
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        /* ─── PANEL OPEN/CLOSE ─── */
        function openM() {
            document.getElementById('main').style.display = 'block';
            document.getElementById('mini').style.display = 'none';
            if (window.TeamBridge) TeamBridge.resizeView(380, 720);
            // If we already have a result, show it; otherwise show waiting
            if (currentNumber !== undefined && currentSize) {
                showResult(currentNumber, currentSize);
            } else {
                setState('wingo');
            }
        }

        function closeM() {
            document.getElementById('main').style.display = 'none';
            document.getElementById('mini').style.display = 'grid';
            if (window.TeamBridge) TeamBridge.resizeView(85, 85);
        }

        /* ─── NUMBER IMAGES (external links) ─── */
        var IMGS = {
            '0': 'https://i.postimg.cc/sx62sGSd/image.png',
            '1': 'https://i.postimg.cc/yNj4M4cR/1.png',
            '2': 'https://i.postimg.cc/SKdFBFCV/2.webp',
            '3': 'https://i.postimg.cc/k4hr5QjG/3.webp',
            '4': 'https://i.postimg.cc/SQ3FFG2T/4.png',
            '5': 'https://i.postimg.cc/hPmFS7Vh/5.webp',
            '6': 'https://i.postimg.cc/sgPtWdnL/6.png',
            '7': 'https://i.postimg.cc/nL0gdKtx/7.png',
            '8': 'https://i.postimg.cc/0Q43v8QC/8.webp',
            '9': 'https://i.postimg.cc/KjgWvd3z/9.webp'
        };

        function getImgSrc(num) {
            return IMGS[String(num)] || '';
        }

        /* ─── API LOGIC ─── */
        var lastPeriodShown = "";
        var isApiFetching = false;
        var currentNumber = undefined;
        var currentSize = "";
        var lastPeriod = "";

        async function fetchData() {
            if (isApiFetching) return;
            isApiFetching = true;
            try {
                const ts = Date.now();
                const response = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${ts}`);
                const data = await response.json();
                if (data && data.data && data.data.list && data.data.list.length > 0) {
                    const last = data.data.list[0];
                    const number = parseInt(last.number);
                    const period = last.issueNumber;
                    if (period !== lastPeriodShown) {
                        lastPeriodShown = period;
                        currentNumber = number;
                        currentSize = (number <= 4) ? 'SMALL' : 'BIG';
                        lastPeriod = period;
                        document.getElementById('periodNum').innerText = period.slice(-4);
                        // If panel is open, show result with animation
                        if (document.getElementById('main').style.display === 'block') {
                            showResult(number, currentSize);
                        }
                    }
                }
            } catch (e) {
                console.log("API Error", e);
            }
            isApiFetching = false;
        }

        // Auto fetch every 2 seconds
        setInterval(fetchData, 2000);

        /* ─── SHOW RESULT WITH ANIMATION ─── */
        function showResult(number, size) {
            if (isAnimating) return;
            isAnimating = true;

            // Set state to scanning
            setState('scanning');

            // After 2 seconds, show result
            setTimeout(function() {
                var cp = lastPeriodShown || '0000';
                cache[cp] = { n: number, sz: size };
                setState('result');
                // Update ball image
                var ball = document.getElementById('ballResult');
                ball.innerHTML = "<img src='" + getImgSrc(String(number)) + "' style='width:100%;height:100%;border-radius:50%;object-fit:cover;filter:drop-shadow(0 0 14px rgba(0,255,126,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.5));display:block;'>";
                // Clear pred-text – no BIG/SMALL text
                document.getElementById('predText').innerText = '';
                // Show sureshot badge
                var badge = document.getElementById('sureshotBadge');
                badge.style.display = 'flex';
                badge.style.animation = 'none';
                void badge.offsetWidth;
                badge.style.animation = 'popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
                // Glow on
                document.getElementById('ballGlow').classList.add('lit');
                var ring = document.querySelector('.ring');
                if (ring) ring.style.boxShadow = '0 0 28px rgba(0,255,126,1),0 0 55px rgba(0,232,114,.7),inset 0 0 28px rgba(0,232,114,.85)';
                // Speak result (optional)
                if (window.TeamBridge && typeof TeamBridge.speak === 'function') {
                    TeamBridge.speak('Result ' + size + ' ' + number);
                }
                isAnimating = false;
            }, 2000);
        }

        var isAnimating = false;

        /* ─── STATE MANAGEMENT ─── */
        var state = 'wingo';
        var cache = {};

        function setState(newState) {
            state = newState;
            render();
        }

        function render() {
            var pt = document.getElementById('predText');
            var btn = document.getElementById('btnExec');
            var pNum = document.getElementById('periodNum');
            var sNum = document.getElementById('seqNum');
            var ball = document.getElementById('ballResult');
            var pWrap = document.getElementById('periodWrapper');
            var tWrap = document.getElementById('timerWrapper');
            var sBadge = document.getElementById('sureshotBadge');
            var hud = document.querySelector('.ai-hud-core');
            var scanOv = document.getElementById('scanOverlay');
            var glow = document.getElementById('ballGlow');
            var ring = document.querySelector('.ring');

            // Hide scan overlay for non-scanning states
            if (state !== 'scanning') {
                if (scanOv) scanOv.style.display = 'none';
                if (window._scanTick) { clearInterval(window._scanTick);
                    window._scanTick = null; }
            }

            // Default: hide sureshot, remove glow
            if (state !== 'result') {
                if (sBadge) sBadge.style.display = 'none';
                if (glow) glow.classList.remove('lit');
                if (ring) ring.style.boxShadow = '';
                // if ball has no image, set '?'
                if (ball && !ball.querySelector('img')) {
                    ball.innerHTML = '?';
                }
            }

            if (state === 'wingo') {
                pt.innerText = 'WAITING';
                pNum.innerText = lastPeriodShown ? lastPeriodShown.slice(-4) : '----';
                sNum.innerHTML = 'READY';
                // ball should be '?'
                if (!ball.querySelector('img')) ball.innerHTML = '?';
                btn.innerText = 'EXECUTE';
                btn.disabled = false;
                btn.onclick = function() { fetchData(); };
                pWrap.style.display = 'flex';
                tWrap.style.display = 'flex';
                if (hud) hud.style.display = 'block';
                // Reset any extra
                if (sBadge) sBadge.style.display = 'none';
                if (glow) glow.classList.remove('lit');
                if (ring) ring.style.boxShadow = '';
                pt.style.bottom = '22px';
            } else if (state === 'scanning') {
                pt.innerText = 'SCANNING';
                pNum.innerText = lastPeriodShown ? lastPeriodShown.slice(-4) : '----';
                sNum.innerHTML = 'SCANNING';
                ball.innerHTML = '';
                btn.innerText = 'SCANNING';
                btn.disabled = true;
                btn.onclick = null;
                pWrap.style.display = 'flex';
                tWrap.style.display = 'flex';
                if (hud) hud.style.display = 'block';
                if (glow) glow.classList.remove('lit');
                if (ring) ring.style.boxShadow = '';
                pt.style.bottom = '22px';
                // Show scan overlay
                if (scanOv) {
                    scanOv.style.display = 'block';
                    if (window._scanTick) clearInterval(window._scanTick);
                    window._scanTick = setInterval(function() {
                        var h = '0123456789ABCDEF';
                        var d3 = document.getElementById('dv3');
                        var d4 = document.getElementById('dv4');
                        var d1 = document.getElementById('dv1');
                        if (d3) d3.innerText = Math.floor(Math.random() * 6 + 93) + '%';
                        if (d4) d4.innerText = h[Math.floor(Math.random() * 16)] + h[Math.floor(Math.random() * 16)];
                        if (d1) d1.innerText = Math.random() > .5 ? 'RUN' : 'ACT';
                    }, 130);
                }
            } else if (state === 'result') {
                var cp = lastPeriodShown || '0000';
                var res = cache[cp];
                if (!res) {
                    setState('wingo');
                    return;
                }
                // NO text in predText – keep empty
                pt.innerText = '';
                pNum.innerText = cp.slice(-4);
                sNum.innerHTML = '#' + cp.slice(-4);
                // Ball image already set by showResult, but ensure it's there
                if (!ball.querySelector('img')) {
                    ball.innerHTML = "<img src='" + getImgSrc(String(res.n)) + "' style='width:100%;height:100%;border-radius:50%;object-fit:cover;filter:drop-shadow(0 0 14px rgba(0,255,126,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.5));display:block;'>";
                }
                btn.innerText = 'EXECUTE';
                btn.disabled = false;
                btn.onclick = function() { fetchData(); };
                pWrap.style.display = 'flex';
                tWrap.style.display = 'flex';
                if (hud) hud.style.display = 'block';
                pt.style.bottom = '22px';
                // Show sureshot, glow, ring
                if (sBadge) {
                    sBadge.style.display = 'flex';
                    sBadge.style.animation = 'none';
                    void sBadge.offsetWidth;
                    sBadge.style.animation = 'popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
                }
                if (glow) glow.classList.add('lit');
                if (ring) ring.style.boxShadow = '0 0 28px rgba(0,255,126,1),0 0 55px rgba(0,232,114,.7),inset 0 0 28px rgba(0,232,114,.85)';
            }
        }

        /* ─── MANUAL FETCH (EXECUTE button) ─── */
        function manualFetch() {
            if (state === 'scanning') return;
            fetchData();
        }

        /* ─── INIT ─── */
        // Set initial state
        setState('wingo');

        // Make panel and mini draggable
        dragElement(document.getElementById('main'), document.getElementById('dragHeader'));
        dragElement(document.getElementById('mini'), document.getElementById('mini'));

        // Override openM to show panel and set initial state
        var originalOpen = openM;
        openM = function() {
            document.getElementById('main').style.display = 'block';
            document.getElementById('mini').style.display = 'none';
            if (window.TeamBridge) TeamBridge.resizeView(380, 720);
            // If we have a current result, show it; else waiting
            if (currentNumber !== undefined && lastPeriodShown) {
                var cp = lastPeriodShown;
                if (cp && cache[cp]) {
                    setState('result');
                    var ball = document.getElementById('ballResult');
                    var res = cache[cp];
                    if (!ball.querySelector('img')) {
                        ball.innerHTML = "<img src='" + getImgSrc(String(res.n)) + "' style='width:100%;height:100%;border-radius:50%;object-fit:cover;filter:drop-shadow(0 0 14px rgba(0,255,126,.9)) drop-shadow(0 2px 6px rgba(0,0,0,.5));display:block;'>";
                    }
                } else {
                    // Have data but no cache? show scanning? 
                    setState('wingo');
                }
            } else {
                setState('wingo');
            }
        };

        var originalClose = closeM;
        closeM = function() {
            document.getElementById('main').style.display = 'none';
            document.getElementById('mini').style.display = 'grid';
            if (window.TeamBridge) TeamBridge.resizeView(85, 85);
        };

        // Timer update
        setInterval(function() {
            var d = new Date();
            var sec = d.getSeconds();
            var rem = 59 - sec;
            var timerEl = document.getElementById('timerText');
            if (timerEl) timerEl.innerText = '00:' + (rem < 10 ? '0' + rem : rem);
        }, 50);

        console.log('Phantom with API fetch ready – only number image shown, no BIG/SMALL text.');
    </script>

</body>
